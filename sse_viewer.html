<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Event Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .event-card {
            transition: all 0.3s ease;
        }
        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .json-viewer {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-indigo-700 dark:text-indigo-400">SSE Event Viewer</h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2">Real-time event stream from ingest-pipeline</p>
            </div>
            <div class="flex gap-2">
                <button id="clear-btn" class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Clear List
                </button>
                <div id="status-badge" class="px-3 py-1 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-400 text-xs font-semibold rounded-full flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></span>
                    Connecting...
                </div>
            </div>
        </header>

        <!-- Configuration -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6">
            <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 uppercase tracking-wider">Configuration</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Host</label>
                    <input type="text" id="config-host" value="localhost" class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-md text-sm text-gray-900 dark:text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Port</label>
                    <input type="number" id="config-port" value="8001" class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-md text-sm text-gray-900 dark:text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Path</label>
                    <input type="text" id="config-path" value="/sse/" class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-md text-sm text-gray-900 dark:text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div class="mt-4">
                <button id="reconnect-btn" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    Update Connection
                </button>
            </div>
        </div>

        <!-- Events List -->
        <div id="events-container" class="space-y-4">
            <!-- Events will be prepended here -->
            <div id="empty-state" class="text-center py-12 bg-white dark:bg-gray-800 rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-700">
                <svg class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-gray-100">No events yet</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Events will appear here as they are received.</p>
            </div>
        </div>
    </div>

    <script>
        const eventsContainer = document.getElementById('events-container');
        const emptyState = document.getElementById('empty-state');
        const statusBadge = document.getElementById('status-badge');
        const clearBtn = document.getElementById('clear-btn');
        const reconnectBtn = document.getElementById('reconnect-btn');

        let eventSource = null;

        function updateStatus(status) {
            statusBadge.classList.remove('bg-green-100', 'text-green-800', 'dark:bg-green-900/30', 'dark:text-green-400', 'bg-red-100', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-400', 'bg-yellow-100', 'text-yellow-800', 'dark:bg-yellow-900/30', 'dark:text-yellow-400');
            const dot = statusBadge.querySelector('span');
            dot.classList.remove('bg-green-400', 'bg-red-400', 'bg-yellow-400', 'animate-pulse');

            if (status === 'connected') {
                statusBadge.classList.add('bg-green-100', 'text-green-800', 'dark:bg-green-900/30', 'dark:text-green-400');
                statusBadge.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full"></span> Connected';
            } else if (status === 'error') {
                statusBadge.classList.add('bg-red-100', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusBadge.innerHTML = '<span class="w-2 h-2 bg-red-400 rounded-full"></span> Connection Error';
            } else {
                statusBadge.classList.add('bg-yellow-100', 'text-yellow-800', 'dark:bg-yellow-900/30', 'dark:text-yellow-400');
                statusBadge.innerHTML = '<span class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></span> Connecting...';
            }
        }

        function connect() {
            if (eventSource) {
                eventSource.close();
            }

            const host = document.getElementById('config-host').value;
            const port = document.getElementById('config-port').value;
            const path = document.getElementById('config-path').value;
            const url = `http://${host}:${port}${path}`;

            console.log(`Connecting to ${url}...`);
            updateStatus('connecting');

            eventSource = new EventSource(url);

            eventSource.onopen = () => {
                console.log('Connected to SSE');
                updateStatus('connected');
            };

            eventSource.onerror = (err) => {
                console.error('SSE Error:', err);
                updateStatus('error');
            };

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    renderEvent(data);
                } catch (e) {
                    console.error('Failed to parse event data:', e);
                }
            };
        }

        function renderEvent(event) {
            if (emptyState) {
                emptyState.remove();
            }

            const card = document.createElement('div');
            card.className = 'event-card bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors duration-200';
            
            const timestamp = new Date(event.created_at || Date.now()).toLocaleTimeString();
            const type = event.event_type || 'unknown.event';
            const id = event.event_id || Math.random().toString(36).substring(7);

            // Determine summary based on event type
            let summary = '';
            let icon = '';
            let color = 'indigo';

            if (type.startsWith('google.drive')) {
                icon = '📄';
                color = 'blue';
                const file = event.data?.name || event.data?.fileId || 'Unknown File';
                if (type.includes('created')) summary = `Created file <strong>${file}</strong>`;
                else if (type.includes('updated')) summary = `Updated file <strong>${file}</strong>`;
                else if (type.includes('moved')) summary = `Moved file <strong>${file}</strong>`;
                else if (type.includes('trashed')) summary = `Trashed file <strong>${file}</strong>`;
                else if (type.includes('untrashed')) summary = `Restored file <strong>${file}</strong>`;
                else if (type.includes('removed')) summary = `Removed file <strong>${file}</strong>`;
                else if (type.includes('shared')) summary = `File <strong>${file}</strong> shared with you`;
                else summary = `Drive action on <strong>${file}</strong>`;
            } 
            else if (type.startsWith('google.calendar')) {
                icon = '📅';
                color = 'green';
                const title = event.data?.current?.summary || event.data?.summary || 'Untitled Event';
                if (type.includes('created')) summary = `New event: <strong>${title}</strong>`;
                else if (type.includes('updated')) summary = `Updated event: <strong>${title}</strong>`;
                else if (type.includes('deleted')) summary = `Deleted event: <strong>${title}</strong>`;
                else if (type.includes('rsvp')) summary = `RSVP changed for <strong>${title}</strong>`;
                else summary = `Calendar event: <strong>${title}</strong>`;
            }
            else if (type.startsWith('faktury.invoice')) {
                icon = '🧾';
                color = 'orange';
                const code = event.entity_id || 'Unknown';
                if (type.includes('created')) summary = `New invoice <strong>${code}</strong>`;
                else if (type.includes('updated')) summary = `Updated invoice <strong>${code}</strong>`;
                else if (type.includes('deleted')) summary = `Deleted invoice <strong>${code}</strong>`;
                else summary = `Invoice <strong>${code}</strong>`;
            }
            else if (type.startsWith('gmail.message')) {
                icon = '✉️';
                color = 'red';
                const subject = event.data?.subject || '(No Subject)';
                if (type.includes('sent')) summary = `Sent: <strong>${subject}</strong>`;
                else if (type.includes('received')) summary = `Received: <strong>${subject}</strong>`;
                else if (type.includes('deleted')) summary = `Deleted message`;
                else summary = `Gmail: <strong>${subject}</strong>`;
            }
            else if (type === 'mock.random_number') {
                icon = '🎲';
                color = 'purple';
                summary = `Random number: <span class="text-lg font-bold">${event.data?.value ?? event.data}</span>`;
            }
            else {
                icon = '🔔';
                summary = `Event: <strong>${type}</strong>`;
            }

            const headerColorClasses = {
                blue: 'bg-blue-50 text-blue-700 border-blue-100 dark:bg-blue-900/20 dark:text-blue-400 dark:border-blue-900/30',
                green: 'bg-green-50 text-green-700 border-green-100 dark:bg-green-900/20 dark:text-green-400 dark:border-green-900/30',
                orange: 'bg-orange-50 text-orange-700 border-orange-100 dark:bg-orange-900/20 dark:text-orange-400 dark:border-orange-900/30',
                red: 'bg-red-50 text-red-700 border-red-100 dark:bg-red-900/20 dark:text-red-400 dark:border-red-900/30',
                purple: 'bg-purple-50 text-purple-700 border-purple-100 dark:bg-purple-900/20 dark:text-purple-400 dark:border-purple-900/30',
                indigo: 'bg-indigo-50 text-indigo-700 border-indigo-100 dark:bg-indigo-900/20 dark:text-indigo-400 dark:border-indigo-900/30'
            };

            const headerClass = headerColorClasses[color] || headerColorClasses.indigo;

            card.innerHTML = `
                <div class="p-4 flex items-start gap-4">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full ${headerClass} border flex items-center justify-center text-xl">
                        ${icon}
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500">${type}</span>
                            <span class="text-xs text-gray-400 dark:text-gray-500">${timestamp}</span>
                        </div>
                        <p class="text-gray-800 dark:text-gray-200 mt-1">${summary}</p>
                        <div class="mt-3 flex gap-2">
                            <button class="toggle-json text-xs font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors">
                                View JSON
                            </button>
                        </div>
                    </div>
                </div>
                <div class="json-container hidden bg-gray-900 dark:bg-black p-4 border-t border-gray-800 dark:border-gray-700">
                    <pre class="json-viewer text-xs text-green-400 dark:text-green-500 overflow-x-auto">${JSON.stringify(event, null, 2)}</pre>
                </div>
            `;

            const toggleBtn = card.querySelector('.toggle-json');
            const jsonContainer = card.querySelector('.json-container');
            toggleBtn.onclick = () => {
                const isHidden = jsonContainer.classList.toggle('hidden');
                toggleBtn.textContent = isHidden ? 'View JSON' : 'Hide JSON';
            };

            eventsContainer.prepend(card);

            // Limit number of events to prevent browser lag
            if (eventsContainer.children.length > 150) {
                eventsContainer.removeChild(eventsContainer.lastChild);
            }
        }

        clearBtn.onclick = () => {
            while (eventsContainer.firstChild) {
                eventsContainer.removeChild(eventsContainer.firstChild);
            }
            eventsContainer.appendChild(emptyState);
        };

        reconnectBtn.onclick = () => {
            connect();
        };

        // Initial connection
        connect();
    </script>
</body>
</html>
